name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v || true

      - name: Build Docker image
        run: docker build -t simple-web-cicd:latest .

      - name: Save Docker image
        run: |
          docker save -o app.tar simple-web-cicd:latest
          chmod 644 app.tar
          # 复制到临时目录，避免权限问题
          cp app.tar /tmp/app.tar

      - name: Copy image to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "/tmp/app.tar"
          target: "/home/ubuntu/"
          overwrite: true
          debug: true

      - name: Deploy container on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu
            ls -la
            sudo /usr/bin/docker load -i app.tar
            sudo /usr/bin/docker stop simple-web-app || true
            sudo /usr/bin/docker rm simple-web-app || true
            sudo /usr/bin/docker run -d --name simple-web-app -p 80:8080 simple-web-cicd:latest
            sudo /usr/bin/docker ps